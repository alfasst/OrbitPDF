<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="planetGrad" cx="50%" cy="50%" r="50%" fx="35%" fy="35%">
      <stop offset="0%" stop-color="#7E57C2" />
      <stop offset="100%" stop-color="#311B92" />
    </radialGradient>

    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFAB00" />
      <stop offset="50%" stop-color="#FFD54F" />
      <stop offset="100%" stop-color="#FFAB00" />
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="rotate(-15 256 256)">
    
    <path d="M 96 256 C 96 180, 416 180, 416 256" 
          stroke="#E65100" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.4" />

    <g transform="rotate(15 256 256)">
      <circle cx="256" cy="256" r="130" fill="url(#planetGrad)" stroke="#1A237E" stroke-width="2" />
      
      <text x="50%" y="310" 
            fill="white" 
            font-family="sans-serif" 
            font-size="60" 
            font-weight="900" 
            text-anchor="middle" 
            dominant-baseline="central"
            style="letter-spacing: 2px; text-shadow: 0px 2px 8px rgba(0,0,0,0.4);">PDF</text>
    </g>

    <g filter="url(#softGlow)">
      <path d="M 96 256 C 96 340, 416 340, 416 256" 
            stroke="url(#orbitGrad)" stroke-width="22" stroke-linecap="round" fill="none" />
    </g>

  </g>
</svg>
